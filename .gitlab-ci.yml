stages:
  - verify
  - audit

default:
  timeout: 1 hour

variables:
  CARGO_BUILD_JOBS: "4"
  RUSTC_WRAPPER: "/usr/local/bin/sccache"
  SCCACHE_DIR: "/sccache"
  SCCACHE_CACHE_SIZE: "20G"
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

before_script:
  - apt-get update -qq && apt-get install -y -qq mold >/dev/null 2>&1 || true
  - sccache --start-server 2>/dev/null || true

# One verify job replaces the old split lint + test. Keeps CARGO_TARGET_DIR
# hot between fmt/clippy/nextest so each cargo invocation reuses rmeta.
verify:
  stage: verify
  resource_group: rust-compile
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo nextest run --workspace --lib --no-fail-fast
    - sccache --show-stats || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Advisory-only. Runs on main merges — never blocks MRs.
audit:
  stage: audit
  needs: []
  script:
    - |
      if ! command -v cargo-audit >/dev/null 2>&1; then
        cargo install cargo-audit --locked --quiet
      fi
    - |
      if [ -d /cargo-advisory-db/.git ]; then
        echo "Refreshing cached advisory-db"
        git -C /cargo-advisory-db fetch --quiet --depth 1 origin master 2>/dev/null || true
        git -C /cargo-advisory-db reset --hard origin/master 2>/dev/null || true
      else
        echo "Cloning advisory-db to cache"
        git clone --depth 1 https://github.com/RustSec/advisory-db.git /cargo-advisory-db
      fi
      mkdir -p ${CARGO_HOME:-$HOME/.cargo}
      ln -sfn /cargo-advisory-db ${CARGO_HOME:-$HOME/.cargo}/advisory-db
    - cargo audit --no-fetch
  timeout: 15 minutes
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
